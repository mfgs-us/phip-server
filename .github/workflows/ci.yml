name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/mfgs-us/phip-py@main
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/mfgs-us/phip-py@main
          pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/mfgs-us/phip-py@main
          pip install -e ".[dev]"
      - name: mypy
        run: mypy src

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: phip-server:ci
      - name: Smoke-test image
        run: |
          docker run -d --name phip-test -p 8080:8080 phip-server:ci
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8080/healthz; then
              echo "healthz OK"
              docker rm -f phip-test
              exit 0
            fi
            sleep 1
          done
          echo "healthz never came up"
          docker logs phip-test
          docker rm -f phip-test
          exit 1
